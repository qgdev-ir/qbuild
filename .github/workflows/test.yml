name: Test

on:
  push:
    branches: [ "main", "feature/*" ]
  pull_request:
    branches: [ "main", "feature/*" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y libxxhash-dev

      - name: Gheckout qson
        uses: actions/checkout@v5
        with:
          repository: qgdev-ir/qson
          path: qson

      - name: Install qson
        run: sudo make install
        working-directory: qson

      - name: Compile
        run: make

      - name: Test
        run: make test
        env:
          LD_LIBRARY_PATH: build

